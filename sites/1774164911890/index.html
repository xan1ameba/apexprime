<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Transform Your Digital Presence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --dark: #0f172a;
            --dark-secondary: #1e293b;
            --gray: #64748b;
            --light-gray: #f1f5f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.2;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease;
        }

        nav.scrolled {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Space Grotesk', sans-serif;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-cta {
            background: var(--primary);
            color: var(--white);
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--dark);
        }

        /* Hero Section */
        .hero {
            padding: 100px 0 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            opacity: 0.5;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-text h1 {
            font-size: 58px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--white);
            line-height: 1.1;
        }

        .hero-text p {
            font-size: 20px;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--white);
            color: var(--primary);
            padding: 16px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.3s ease;
            display: inline-block;
            border: 2px solid var(--white);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: var(--white);
            padding: 16px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.3s ease;
            display: inline-block;
            border: 2px solid var(--white);
        }

        .btn-secondary:hover {
            background: var(--white);
            color: var(--primary);
            transform: translateY(-3px);
        }

        .hero-mockup {
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        .mockup-image {
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Social Proof Bar */
        .social-proof {
            background: var(--white);
            padding: 40px 0;
            border-bottom: 1px solid var(--light-gray);
        }

        .social-proof-content {
            text-align: center;
        }

        .social-proof-content p {
            color: var(--gray);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .logo-grid {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
            opacity: 0.6;
        }

        .company-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Features Section */
        .features {
            padding: 100px 0;
            background: var(--light-gray);
        }

        .section-header {
            text-align: center;
            margin-bottom: 70px;
        }

        .section-label {
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--dark);
        }

        .section-header p {
            font-size: 20px;
            color: var(--gray);
            max-width: 700px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .feature-card {
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            transition: all 0.3s ease;
            border: 1px solid rgba(99, 102, 241, 0.1);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .feature-card.animate {
            opacity: 1;
            transform: translateY(0);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 24px;
            color: var(--white);
        }

        .feature-card h3 {
            font-size: 24px;
            margin-bottom: 16px;
            color: var(--dark);
        }

        .feature-card p {
            color: var(--gray);
            line-height: 1.7;
        }

        /* How It Works */
        .how-it-works {
            padding: 100px 0;
            background: var(--white);
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 60px;
            margin-top: 60px;
        }

        .step {
            text-align: center;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .step.animate {
            opacity: 1;
            transform: translateY(0);
        }

        .step-number {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 24px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .step h3 {
            font-size: 28px;
            margin-bottom: 16px;
            color: var(--dark);
        }

        .step p {
            color: var(--gray);
            font-size: 18px;
            line-height: 1.7;
        }

        /* Testimonials */
        .testimonials {
            padding: 100px 0;
            background: var(--light-gray);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-top: 60px;
        }

        .testimonial-card {
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .testimonial-card.animate {
            opacity: 1;
            transform: translateY(0);
        }

        .testimonial-rating {
            color: #fbbf24;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .testimonial-text {
            font-size: 18px;
            line-height: 1.7;
            color: var(--dark);
            margin-bottom: 24px;
            font-style: italic;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .author-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 700;
            font-size: 20px;
        }

        .author-info h4 {
            font-size: 16px;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .author-info p {
            font-size: 14px;
            color: var(--gray);
        }

        /* Pricing */
        .pricing {
            padding: 100px 0;
            background: var(--white);
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-top: 60px;
        }

        .pricing-card {
            background: var(--white);
            border: 2px solid var(--light-gray);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .pricing-card.animate {
            opacity: 1;
            transform: translateY(0);
        }

        .pricing-card.featured {
            border-color: var(--primary);
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            transform: scale(1.05);
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.3);
        }

        .pricing-card.featured.animate {
            transform: scale(1.05) translateY(0);
        }

        .pricing-card.featured h3,
        .pricing-card.featured .price,
        .pricing-card.featured p,
        .pricing-card.featured li {
            color: var(--white);
        }

        .pricing-label {
            display: inline-block;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .pricing-card.featured .pricing-label {
            background: rgba(255, 255, 255, 0.2);
            color: var(--white);
        }

        .pricing-card h3 {
            font-size: 28px;
            margin-bottom: 16px;
            color: var(--dark);
        }

        .price {
            font-size: 56px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .price span {
            font-size: 24px;
            color: var(--gray);
        }

        .pricing-card.featured .price span {
            color: rgba(255, 255, 255, 0.8);
        }

        .price-period {
            color: var(--gray);
            margin-bottom: 32px;
        }

        .pricing-card.featured .price-period {
            color: rgba(255, 255, 255, 0.8);
        }

        .pricing-features {
            list-style: none;
            margin-bottom: 40px;
            text-align: left;
        }

        .pricing-features li {
            padding: 12px 0;
            color: var(--gray);
            border-bottom: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pricing-card.featured .pricing-features li {
            border-bottom-color: rgba(255, 255, 255, 0.2);
        }

        .pricing-features li::before {
            content: "✓";
            color: var(--primary);
            font-weight: 700;
            font-size: 18px;
        }

        .pricing-card.featured .pricing-features li::before {
            color: var(--white);
        }

        .pricing-btn {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--primary);
            color: var(--white);
        }

        .pricing-card.featured .pricing-btn {
            background: var(--white);
            color: var(--primary);
        }

        .pricing-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        /* FAQ */
        .faq {
            padding: 100px 0;
            background: var(--light-gray);
        }

        .faq-list {
            max-width: 800px;
            margin: 60px auto 0;
        }

        .faq-item {
            background: var(--white);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(99, 102, 241, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .faq-item.animate {
            opacity: 1;
            transform: translateY(0);
        }

        .faq-question {
            width: 100%;
            padding: 24px 30px;
            background: none;
            border: none;
            text-align: left;
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .faq-question:hover {
            color: var(--primary);
        }

        .faq-icon {
            font-size: 24px;
            color: var(--primary);
            transition: transform 0.3s ease;
        }

        .faq-item.active .faq-icon {
            transform: rotate(45deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .faq-answer-content {
            padding: 0 30px 24px;
            color: var(--gray);
            line-height: 1.7;
            font-size: 16px;
        }

        .faq-item.active .faq-answer {
            max-height: 500px;
        }

        /* CTA Section */
        .cta {
            padding: 100px 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            position: relative;
            overflow: hidden;
        }

        .cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid2" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid2)"/></svg>');
        }

        .cta-content {
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
        }

        .cta-content h2 {
            font-size: 48px;
            color: var(--white);
            margin-bottom: 24px;
        }

        .cta-content p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
        }

        .email-form {
            display: flex;
            gap: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .email-input {
            flex: 1;
            padding: 18px 24px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            outline: none;
        }

        .email-submit {
            padding: 18px 40px;
            background: var(--dark);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .email-submit:hover {
            background: var(--dark-secondary);
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
            background: var(--dark);
            color: var(--white);
            padding: 60px 0 30px;
        }

        .footer-content {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 60px;
            margin-bottom: 40px;
        }

        .footer-about h3 {
            font-size: 28px;
            margin-bottom: 16px;
            color: var(--primary-light);
        }

        .footer-about p {
            color: var(--gray);
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .social-links {
            display: flex;
            gap: 16px;
        }

        .social-link {
            width: 40px;
            height: 40px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-light);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: var(--primary);
            color: var(--white);
            transform: translateY(-3px);
        }

        .footer-links h4 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--white);
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 12px;
        }

        .footer-links a {
            color: var(--gray);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--primary-light);
        }

        .footer-bottom {
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: var(--gray);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 968px) {
            .nav-links {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }

            .hero-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .hero-text h1 {
                font-size: 42px;
            }

            .features-grid,
            .testimonials-grid,
            .pricing-grid {
                grid-template-columns: 1fr;
            }

            .steps {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .footer-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .email-form {
                flex-direction: column;
            }

            .section-header h2 {
                font-size: 36px;
            }

            .cta-content h2 {
                font-size: 36px;
            }
        }

        @media (max-width: 640px) {
            .hero {
                padding: 60px 0 40px;
            }

            .hero-text h1 {
                font-size: 32px;
            }

            .hero-text p {
                font-size: 18px;
            }

            .hero-buttons {
                flex-direction: column;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                text-align: center;
            }

            .section-header h2 {
                font-size: 28px;
            }

            .features,
            .how-it-works,
            .testimonials,
            .pricing,
            .faq,
            .cta {
                padding: 60px 0;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav id="navbar">
        <div class="container">
            <div class="nav-content">
                <div class="logo">Nexus</div>
                <ul class="nav-links">
                    <li><a href="#features">Features</a></li>
                    <li><a href="#how-it-works">How It Works</a></li>
                    <li><a href="#pricing">Pricing</a></li>
                    <li><a href="#faq">FAQ</a></li>
                    <li><a href="#cta" class="nav-cta">Get Started</a></li>
                </ul>
                <button class="mobile-menu-btn">☰</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="hero-text">
                    <h1>Transform Your Digital Presence Into Revenue</h1>
                    <p>Nexus empowers businesses to automate workflows, engage customers, and scale operations with intelligent automation that works 24/7.</p>
                    <div class="hero-buttons">
                        <a href="#cta" class="btn-primary">Start Free Trial</a>
                        <a href="#how-it-works" class="btn-secondary">See How It Works</a>
                    </div>
                </div>
                <div class="hero-mockup">
                    <div class="mockup-image">
                        <svg width="100%" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="600" height="400" rx="10" fill="white"/>
